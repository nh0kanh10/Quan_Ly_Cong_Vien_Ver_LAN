<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Diagrams — Hệ thống Đại Nam</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #1a1b2e;
      color: #e0e0e8;
      min-height: 100vh
    }

    header {
      background: #22243a;
      border-bottom: 1px solid #333;
      padding: 14px 24px;
      text-align: center
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #a5b4fc
    }

    header p {
      font-size: 11px;
      color: #888;
      margin-top: 2px
    }

    nav {
      display: flex;
      gap: 4px;
      padding: 10px 24px;
      background: #1e2030;
      border-bottom: 1px solid #333;
      overflow-x: auto
    }

    nav button {
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      border: 1px solid #333;
      color: #888;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: .2s
    }

    nav button:hover {
      border-color: #666;
      color: #ccc
    }

    nav button.active {
      background: rgba(165, 180, 252, .1);
      border-color: #6366f1;
      color: #a5b4fc
    }

    .sub-nav {
      display: flex;
      gap: 4px;
      padding: 8px 24px;
      background: #1a1b2e;
      border-bottom: 1px solid #2a2d3e
    }

    .sub-nav button {
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      background: #22243a;
      border: 1px solid #333;
      color: #888;
      cursor: pointer;
      font-family: inherit;
      transition: .2s
    }

    .sub-nav button:hover {
      color: #ccc
    }

    .sub-nav button.active {
      background: #2d3050;
      border-color: #6366f1;
      color: #a5b4fc
    }

    main {
      display: flex;
      justify-content: center;
      padding: 24px 16px 60px
    }

    .svg-wrap {
      background: #fefcf0;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .4);
      overflow-x: auto;
      display: inline-block
    }

    .svg-wrap svg {
      display: block
    }

    .legend-wrap {
      max-width: 720px;
      margin: 16px auto 0;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 12px 20px;
      background: #22243a;
      border-radius: 8px;
      border: 1px solid #333
    }

    .legend-wrap .li {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #999
    }

    .legend-wrap .li svg {
      flex-shrink: 0
    }
  </style>
</head>

<body>
  <header>
    <h1>Activity Diagrams — Hệ thống Quản lý Đại Nam</h1>
    <p>UML Activity Diagram (Swimlane) · CN09 Sản Phẩm · Khách Hàng CRM · POS Bán Hàng · CN10 Trung Tâm Kho · CN11 Danh
      Mục Kho</p>
  </header>
  <nav id="moduleNav"></nav>
  <div class="sub-nav" id="subNav"></div>
  <main>
    <div class="svg-wrap" id="svgWrap"></div>
  </main>
  <div class="legend-wrap">
    <div class="li"><svg width="18" height="18">
        <circle cx="9" cy="9" r="7" fill="#333" />
      </svg> Initial Node</div>
    <div class="li"><svg width="18" height="18">
        <circle cx="9" cy="9" r="7" fill="none" stroke="#333" stroke-width="2" />
        <circle cx="9" cy="9" r="4" fill="#333" />
      </svg> Activity Final</div>
    <div class="li"><svg width="24" height="18">
        <rect x="1" y="2" width="22" height="14" rx="4" fill="#fff" stroke="#333" stroke-width="1.2" />
      </svg> Action</div>
    <div class="li"><svg width="20" height="18">
        <polygon points="10,1 19,9 10,17 1,9" fill="#fff" stroke="#333" stroke-width="1.2" />
      </svg> Decision</div>
    <div class="li"><svg width="24" height="10">
        <rect x="1" y="2" width="22" height="5" rx="1" fill="#333" />
      </svg> Fork / Join</div>
    <div class="li"><svg width="30" height="12">
        <line x1="0" y1="6" x2="24" y2="6" stroke="#555" stroke-width="1.3" />
        <polygon points="24,3 30,6 24,9" fill="#555" />
      </svg> Transition</div>
    <div class="li"><svg width="24" height="12"><text x="0" y="10" font-size="9" fill="#666"
          font-style="italic">[guard]</text></svg> Guard Expression</div>
  </div>

  <script>
    const C = {
      PAD: 55, LANE_W: 380, ROW_H: 74, HDR_H: 36,
      ACT_W: 192, ACT_H: 44, ACT_R: 8,
      DIA_HW: 48, DIA_HH: 28,
      START_R: 11, END_OR: 13, END_IR: 7,
      BAR_W: 100, BAR_H: 5,
      LOOP_GAP: 10, SKIP_GAP: 10,
      FONT: 11, DFONT: 10, GFONT: 9.5,
    };
    function lx(lane) { return lane === .5 ? C.PAD + C.LANE_W : C.PAD + lane * C.LANE_W + C.LANE_W / 2; }
    function ly(row) { return C.HDR_H + C.PAD + row * C.ROW_H; }
    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function port(n, side) {
      const x = lx(n.lane) + (n.dx || 0), y = ly(n.row) + (n.dy || 0);
      if (n.type === 'start') { const r = C.START_R; return side === 'bottom' ? { x, y: y + r } : side === 'top' ? { x, y: y - r } : side === 'left' ? { x: x - r, y } : { x: x + r, y }; }
      if (n.type === 'end') { const r = C.END_OR; return side === 'bottom' ? { x, y: y + r } : side === 'top' ? { x, y: y - r } : side === 'left' ? { x: x - r, y } : { x: x + r, y }; }
      if (n.type === 'decision') { return side === 'top' ? { x, y: y - C.DIA_HH } : side === 'bottom' ? { x, y: y + C.DIA_HH } : side === 'left' ? { x: x - C.DIA_HW, y } : { x: x + C.DIA_HW, y }; }
      if (n.type === 'fork' || n.type === 'join') { const bw = n.barW || C.BAR_W; return side === 'top' ? { x, y: y - C.BAR_H / 2 } : side === 'bottom' ? { x, y: y + C.BAR_H / 2 } : side === 'left' ? { x: x - bw / 2, y } : { x: x + bw / 2, y }; }
      const hw = C.ACT_W / 2, hh = C.ACT_H / 2;
      return side === 'top' ? { x, y: y - hh } : side === 'bottom' ? { x, y: y + hh } : side === 'left' ? { x: x - hw, y } : { x: x + hw, y };
    }

    function routeEdge(fn, tn, e) {
      let fp = e.fp, tp = e.tp || 'top';
      if (!fp) {
        if (tn.row < fn.row) fp = 'left';
        else if (fn.row === tn.row) fp = fn.lane < tn.lane ? 'right' : 'left';
        else fp = 'bottom';
      }
      if (tn.row < fn.row && !e.tp) tp = 'left';
      if ((fn.type === 'fork' || fn.type === 'join') && !e.skipR && tn.row > fn.row) {
        const barY = ly(fn.row) + C.BAR_H / 2, ep = port(tn, 'top');
        return { path: `M${ep.x},${barY}L${ep.x},${ep.y}`, gx: ep.x + 8, gy: (barY + ep.y) / 2, ga: 'start' };
      }
      if ((tn.type === 'fork' || tn.type === 'join') && !e.skipR && fn.row < tn.row) {
        const sp = port(fn, fp === 'bottom' ? 'bottom' : fp), barY = ly(tn.row) - C.BAR_H / 2;
        return { path: `M${sp.x},${sp.y}L${sp.x},${barY}`, gx: sp.x + 8, gy: sp.y + 14, ga: 'start' };
      }
      const s = port(fn, fp), t = port(tn, tp);
      let path, gx, gy, ga = 'middle';
      const d = DIAGRAMS[curMod].diagrams[curSub];
      const numLanes = d.lanes ? d.lanes.length : 2;

      if (tn.row < fn.row || e.loop) {
        const off = e._lo || 0;
        // mx is calculated relative to target node's lane's left edge to save space
        const laneLeft = C.PAD + Math.floor(tn.lane) * C.LANE_W;
        const mx = laneLeft + 25 + off * C.LOOP_GAP;
        const et = port(tn, tp === 'top' ? 'left' : tp);
        path = `M${s.x},${s.y}L${mx},${s.y}L${mx},${et.y}L${et.x},${et.y}`;
        gx = mx - 3; gy = (s.y + et.y) / 2; ga = 'end';
      } else if (e.skipR) {
        const off = e._ro || 0;
        // rx is calculated relative to the entire diagram's right edge
        const rx = C.PAD + numLanes * C.LANE_W - 25 - off * C.SKIP_GAP;
        const et = port(tn, 'right');
        path = `M${s.x},${s.y}L${rx},${s.y}L${rx},${et.y}L${et.x},${et.y}`;
        gx = s.x + 14; gy = s.y - 6; ga = 'start';
      } else if (fp === 'bottom' && fn.lane === tn.lane) {
        path = `M${s.x},${s.y}L${t.x},${t.y}`;
        gx = s.x + 8; gy = s.y + 14; ga = 'start';
      } else if (fp === 'bottom' && fn.lane !== tn.lane) {
        const my = (s.y + t.y) / 2;
        path = `M${s.x},${s.y}L${s.x},${my}L${t.x},${my}L${t.x},${t.y}`;
        gx = (s.x + t.x) / 2; gy = my - 5;
      } else if ((fp === 'left' || fp === 'right') && tn.row > fn.row) {
        path = `M${s.x},${s.y}L${t.x},${s.y}L${t.x},${t.y}`;
        gx = fp === 'left' ? s.x - 5 : s.x + 5; gy = s.y - 6; ga = fp === 'left' ? 'end' : 'start';
      } else if (fn.row === tn.row) {
        path = `M${s.x},${s.y}L${t.x},${t.y}`;
        gx = (s.x + t.x) / 2; gy = s.y - 8;
      } else {
        path = `M${s.x},${s.y}L${t.x},${t.y}`;
        gx = (s.x + t.x) / 2; gy = (s.y + t.y) / 2 - 6;
      }
      return { path, gx, gy, ga };
    }

    function drawNode(n) {
      const x = lx(n.lane) + (n.dx || 0), y = ly(n.row) + (n.dy || 0); let s = '';
      s += `<g class="node" data-id="${n.id}" style="cursor: grab;">`;
      switch (n.type) {
        case 'start': s += `<circle cx="${x}" cy="${y}" r="${C.START_R}" fill="#333"/>`; break;
        case 'end': s += `<circle cx="${x}" cy="${y}" r="${C.END_OR}" fill="none" stroke="#333" stroke-width="2.5"/><circle cx="${x}" cy="${y}" r="${C.END_IR}" fill="#333"/>`; break;
        case 'activity': {
          const hw = C.ACT_W / 2, hh = C.ACT_H / 2;
          s += `<rect x="${x - hw}" y="${y - hh}" width="${C.ACT_W}" height="${C.ACT_H}" rx="${C.ACT_R}" fill="#fff" stroke="#333" stroke-width="1.4"/>`;
          s += mtext(x, y, n.text, C.FONT); break;
        }
        case 'decision': {
          s += `<polygon points="${x},${y - C.DIA_HH} ${x + C.DIA_HW},${y} ${x},${y + C.DIA_HH} ${x - C.DIA_HW},${y}" fill="#fff" stroke="#333" stroke-width="1.4"/>`;
          if (n.text) s += mtext(x, y, n.text, C.DFONT); break;
        }
        case 'fork': case 'join': {
          const bw = n.barW || C.BAR_W;
          s += `<rect x="${x - bw / 2}" y="${y - C.BAR_H / 2}" width="${bw}" height="${C.BAR_H}" fill="#333" rx="1"/>`; break;
        }
      }
      s += `</g>`;
      return s;
    }

    function mtext(x, y, text, fs) {
      if (!text) return '';
      const lines = text.split('\n'), lh = fs * 1.35, th = (lines.length - 1) * lh;
      return lines.map((line, i) =>
        `<text x="${x}" y="${y - th / 2 + i * lh}" text-anchor="middle" dominant-baseline="central" font-size="${fs}" fill="#333" font-family="Inter,sans-serif">${esc(line)}</text>`
      ).join('');
    }

    function renderDiagram(d) {
      const numLanes = d.lanes ? d.lanes.length : 2;
      const svgW = C.PAD * 2 + C.LANE_W * numLanes;
      const maxR = Math.max(...d.nodes.map(n => n.row));
      const svgH = C.HDR_H + C.PAD + (maxR + 1) * C.ROW_H + C.PAD;
      const nm = {}; d.nodes.forEach(n => nm[n.id] = n);
      let lo = 0, ro = 0;
      d.edges.forEach(e => {
        const f = nm[e.from], t = nm[e.to];
        if (t.row < f.row || e.loop) e._lo = lo++;
        if (e.skipR) e._ro = ro++;
      });
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" style="font-family:Inter,sans-serif">`;
      svg += `<defs><marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0.5 7,3 0,5.5" fill="#444"/></marker></defs>`;
      svg += `<rect width="${svgW}" height="${svgH}" fill="#fefcf0"/>`;
      const laneH = svgH - C.HDR_H;
      for (let i = 0; i < numLanes; i++) {
        const lx0 = C.PAD + i * C.LANE_W;
        svg += `<rect x="${lx0}" y="${C.HDR_H}" width="${C.LANE_W}" height="${laneH}" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="8,5"/>`;
        svg += `<rect x="${lx0}" y="${C.HDR_H}" width="${C.LANE_W}" height="28" fill="#f0ead6" stroke="#999" stroke-width="1.5"/>`;
        svg += `<text x="${lx0 + C.LANE_W / 2}" y="${C.HDR_H + 15}" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="600" fill="#333">${esc(d.lanes[i])}</text>`;
      }
      svg += `<text x="${svgW / 2}" y="${C.HDR_H / 2 + 1}" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="#444">${esc(d.title)}</text>`;
      svg += '<g>';
      d.edges.forEach(e => {
        const f = nm[e.from], t = nm[e.to];
        const r = routeEdge(f, t, e);
        svg += `<path d="${r.path}" fill="none" stroke="#555" stroke-width="1.3" marker-end="url(#ah)"/>`;
        if (e.guard) svg += `<text x="${r.gx}" y="${r.gy}" text-anchor="${r.ga}" font-size="${C.GFONT}" fill="#555" font-style="italic" font-family="Inter,sans-serif">[${esc(e.guard)}]</text>`;
      });
      svg += '</g><g>';
      d.nodes.forEach(n => { svg += drawNode(n); });
      svg += '</g></svg>';
      document.getElementById('svgWrap').innerHTML = svg;
    }

    // =====================================================
    // DỮ LIỆU BIỂU ĐỒ
    // =====================================================
    const DIAGRAMS = {

      // ===================== CN09: SẢN PHẨM =====================
      sanpham: {
        tabs: [
          { id: 'sp_themmoi', label: 'Thêm mới sản phẩm' },
          { id: 'sp_chinhsua', label: 'Chỉnh sửa sản phẩm' },
          { id: 'sp_xoa', label: 'Xóa ẩn sản phẩm' },
        ],
        diagrams: {
          sp_themmoi: {
            title: 'CN09 — Thêm mới Sản phẩm (4 Tab & Dynamic Config)',
            lanes: ['Quản lý', 'Hệ thống'],
            nodes: [
              { id: 's', type: 'start', lane: 0, row: 0 },
              { id: 'a1', type: 'activity', lane: 0, row: 1, text: 'Nhấn nút "Thêm mới"' },
              { id: 'a2', type: 'activity', lane: 1, row: 2, text: 'Reset Form, mở panel phải\nFocus vào ô Tên SP' },
              { id: 'a3', type: 'activity', lane: 0, row: 3, text: 'Nhập thông tin chung\n(Tên, Loại SP, ĐVT...)' },
              { id: 'a4', type: 'activity', lane: 1, row: 4, text: 'Tự động tải UI cho Tab 4\ntương ứng Loại SP' },
              { id: 'a4x', type: 'activity', lane: 0, row: 5, text: 'Hoàn thiện nhập liệu\n(Giá, Quy đổi, Cấu hình Tab 4)' },
              { id: 'a5', type: 'activity', lane: 0, row: 6, text: 'Nhấn nút "Lưu" (F2)' },
              { id: 'd1', type: 'decision', lane: 1, row: 7, text: 'Loại F&B\ncó BOM?' },
              { id: 'd2', type: 'decision', lane: 1, row: 8, text: 'Mã SP\ntồn tại?' },
              { id: 'err', type: 'activity', lane: 0, row: 9, text: 'Hiển thị thông báo lỗi\n(Lỗi trùng mã / Thiếu BOM)' },
              { id: 'a6', type: 'activity', lane: 1, row: 10, text: 'Lưu toàn bộ thông tin\nSản phẩm vào CSDL' },
              { id: 'a7', type: 'activity', lane: 1, row: 11, text: 'Hiển thị thông báo\nLưu thành công' },
              { id: 'a8', type: 'activity', lane: 1, row: 12, text: 'Hệ thống tự động làm mới\ndanh sách sản phẩm' },
              { id: 'e', type: 'end', lane: .5, row: 13 },
            ],
            edges: [
              { from: 's', to: 'a1' },
              { from: 'a1', to: 'a2' },
              { from: 'a2', to: 'a3' },
              { from: 'a3', to: 'a4' },
              { from: 'a4', to: 'a4x' },
              { from: 'a4x', to: 'a5' },
              { from: 'a5', to: 'd1' },
              { from: 'd1', to: 'err', guard: 'Thiếu (ERR)' },
              { from: 'd1', to: 'd2', guard: 'Đủ' },
              { from: 'd2', to: 'err', guard: 'Có (ERR)' },
              { from: 'd2', to: 'a6', guard: 'Không' },
              { from: 'err', to: 'a4x', loop: true },
              { from: 'a6', to: 'a7' },
              { from: 'a7', to: 'a8' },
              { from: 'a8', to: 'e' },
            ],
          },
          sp_chinhsua: {
            title: 'CN09 — Chỉnh sửa & Dirty Tracking',
            lanes: ['Quản lý', 'Hệ thống'],
            nodes: [
              { id: 's', type: 'start', lane: 0, row: 0 },
              { id: 'a1', type: 'activity', lane: 0, row: 1, text: 'Chọn dòng trên lưới' },
              { id: 'a2', type: 'activity', lane: 1, row: 2, text: 'Nạp thông tin chung\nKhóa Mã SP & Loại SP' },
              { id: 'a3', type: 'activity', lane: 1, row: 3, text: 'Tự động hiển thị Tab 4\n(Lưu trú, F&B, Vé...)' },
              { id: 'a4', type: 'activity', lane: 0, row: 4, text: 'Chỉnh sửa nội dung các Tab\n(Ghi nhận thay đổi)' },
              { id: 'd1', type: 'decision', lane: 0, row: 5, text: 'Hành động?' },
              { id: 'd2', type: 'decision', lane: 1, row: 6, text: 'Dữ liệu\nđã thay đổi?' },
              { id: 'a5', type: 'activity', lane: 1, row: 7, text: 'Hiện cảnh báo:\n"Bạn có thay đổi chưa lưu"' },
              { id: 'd3', type: 'decision', lane: 0, row: 8, text: 'Xác nhận hủy?' },
              { id: 'a6', type: 'activity', lane: 0, row: 9, text: 'Quay lại tiếp tục sửa' },
              { id: 'a7', type: 'activity', lane: 1, row: 9, text: 'Hủy thay đổi\nNạp lại dữ liệu gốc' },
              { id: 'a8', type: 'activity', lane: 0, row: 10, text: 'Nhấn nút "Lưu" (F2)' },
              { id: 'd4', type: 'decision', lane: 1, row: 11, text: 'Loại F&B\ncó BOM?' },
              { id: 'err', type: 'activity', lane: 0, row: 12, text: 'Hiển thị lỗi chi tiết\n(Thiếu BOM / Dữ liệu trống)' },
              { id: 'a9', type: 'activity', lane: 1, row: 13, text: 'Lưu thông tin thay đổi\nvào cơ sở dữ liệu' },
              { id: 'a10', type: 'activity', lane: 1, row: 14, text: 'Hiển thị thông báo thành công\nvà làm mới danh sách' },
              { id: 'e', type: 'end', lane: .5, row: 15 },
            ],
            edges: [
              { from: 's', to: 'a1' },
              { from: 'a1', to: 'a2' },
              { from: 'a2', to: 'a3' },
              { from: 'a3', to: 'a4' },
              { from: 'a4', to: 'd1' },
              { from: 'd1', to: 'd2', guard: 'Hủy/Thoát' },
              { from: 'd1', to: 'a8', guard: 'Lưu', fp: 'right', skipR: true },
              { from: 'd2', to: 'a5', guard: 'Đúng' },
              { from: 'd2', to: 'e', guard: 'Sai', fp: 'right', skipR: true },
              { from: 'a5', to: 'd3' },
              { from: 'd3', to: 'a6', guard: 'Không', fp: 'left' },
              { from: 'd3', to: 'a7', guard: 'Có' },
              { from: 'a6', to: 'a4', loop: true, _lo: 1 },
              { from: 'a7', to: 'e' },
              { from: 'a8', to: 'd4' },
              { from: 'd4', to: 'err', guard: 'Thiếu (ERR)' },
              { from: 'd4', to: 'a9', guard: 'Đủ' },
              { from: 'err', to: 'a4', loop: true },
              { from: 'a9', to: 'a10' },
              { from: 'a10', to: 'e' },
            ],
          },
          sp_xoa: {
            title: 'CN09 — Xóa ẩn sản phẩm (Soft Delete)',
            lanes: ['Quản lý', 'Hệ thống'],
            nodes: [

    // =====================================================
    // TAB LOGIC
    // =====================================================
    let curMod = 'sanpham', curSub = '';
    function initTabs() {
      const modules = [
        { id: 'sanpham', label: 'CN09. Sản Phẩm' },
        { id: 'khachhang', label: 'Khách Hàng CRM' },
        { id: 'pos_phien', label: 'POS. Phiên Thu Ngân' },
        { id: 'pos_banhang', label: 'POS. Bán Hàng' },
        { id: 'pos_thanhtoan', label: 'POS. Thanh Toán' },
        { id: 'pos_hoanhang', label: 'POS. Hoàn Hàng' },
        { id: 'taophieu', label: 'CN10. Tạo Phiếu Kho' },
        { id: 'duyet', label: 'CN10. Phê Duyệt' },
        { id: 'tonkho', label: 'CN10. Tồn Kho' },
        { id: 'lichsu', label: 'CN10. Lịch Sử' },
        { id: 'danhmuckho', label: 'CN11. Danh Mục Kho' },
        { id: 'luutru', label: 'Quản Lý Lưu Trú' },
        { id: 'baocao', label: 'Báo Cáo Doanh Thu' },
      ];
      const nav = document.getElementById('moduleNav');
      nav.innerHTML = modules.map(m => `<button data-mod="${m.id}" class="${m.id === curMod ? 'active' : ''}">${m.label}</button>`).join('');
      nav.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => { nav.querySelectorAll('button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); curMod = btn.dataset.mod; renderSubTabs(); };
      });
      renderSubTabs();
    }
    function renderSubTabs() {
      const mod = DIAGRAMS[curMod], sn = document.getElementById('subNav');
      sn.innerHTML = mod.tabs.map((t, i) => `<button data-sub="${t.id}" class="${i === 0 ? 'active' : ''}">${t.label}</button>`).join('');
      curSub = mod.tabs[0].id;
      renderDiagram(mod.diagrams[curSub]);
      sn.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => { sn.querySelectorAll('button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); curSub = btn.dataset.sub; renderDiagram(DIAGRAMS[curMod].diagrams[curSub]); };
      });
    }
    // =====================================================
    // DRAG & DROP LOGIC
    // =====================================================
    let isDragging = false;
    let dragNodeId = null;
    let dragStartX = 0, dragStartY = 0;
    let origDx = 0, origDy = 0;

    document.addEventListener('mousedown', e => {
      const g = e.target.closest('g.node');
      if (!g) return;
      isDragging = true;
      dragNodeId = g.dataset.id;
      const mod = DIAGRAMS[curMod].diagrams[curSub];
      const n = mod.nodes.find(x => x.id === dragNodeId);
      if (!n) return;
      origDx = n.dx || 0;
      origDy = n.dy || 0;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      if (g.style) g.style.cursor = 'grabbing';
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!isDragging || !dragNodeId) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      const mod = DIAGRAMS[curMod].diagrams[curSub];
      const n = mod.nodes.find(x => x.id === dragNodeId);
      if (n) {
        n.dx = origDx + dx;
        n.dy = origDy + dy;
        renderDiagram(mod);
      }
    });

    document.addEventListener('mouseup', () => {
      if (isDragging && dragNodeId) {
        console.log("--- TỌA ĐỘ VỪA DỜI ---");
        const mod = DIAGRAMS[curMod].diagrams[curSub];
        mod.nodes.forEach(n => {
          if (n.dx || n.dy) console.log(`{ id: '${n.id}', dx: ${n.dx}, dy: ${n.dy} }`);
        });
      }
      isDragging = false;
      dragNodeId = null;
    });

    document.addEventListener('DOMContentLoaded', initTabs);
  </script>
</body>

</html>
