<script>
const C = {
  PAD: 55, LANE_W: 290, ROW_H: 74, HDR_H: 36,
  ACT_W: 192, ACT_H: 44, ACT_R: 8,
  DIA_HW: 48, DIA_HH: 28,
  START_R: 11, END_OR: 13, END_IR: 7,
  BAR_W: 100, BAR_H: 5,
  LOOP_GAP: 10, SKIP_GAP: 10,
  FONT: 11, DFONT: 10, GFONT: 9.5,
};
const SVG_W = C.PAD * 2 + C.LANE_W * 2;
function lx(lane) { return lane === .5 ? C.PAD + C.LANE_W : C.PAD + lane * C.LANE_W + C.LANE_W / 2; }
function ly(row) { return C.HDR_H + C.PAD + row * C.ROW_H; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function port(n, side) {
  const x = lx(n.lane), y = ly(n.row);
  if (n.type==='start'){const r=C.START_R;return side==='bottom'?{x,y:y+r}:side==='top'?{x,y:y-r}:side==='left'?{x:x-r,y}:{x:x+r,y};}
  if (n.type==='end'){const r=C.END_OR;return side==='bottom'?{x,y:y+r}:side==='top'?{x,y:y-r}:side==='left'?{x:x-r,y}:{x:x+r,y};}
  if (n.type==='decision'){return side==='top'?{x,y:y-C.DIA_HH}:side==='bottom'?{x,y:y+C.DIA_HH}:side==='left'?{x:x-C.DIA_HW,y}:{x:x+C.DIA_HW,y};}
  if (n.type==='fork'||n.type==='join'){const bw=n.barW||C.BAR_W;return side==='top'?{x,y:y-C.BAR_H/2}:side==='bottom'?{x,y:y+C.BAR_H/2}:side==='left'?{x:x-bw/2,y}:{x:x+bw/2,y};}
  const hw=C.ACT_W/2,hh=C.ACT_H/2;
  return side==='top'?{x,y:y-hh}:side==='bottom'?{x,y:y+hh}:side==='left'?{x:x-hw,y}:{x:x+hw,y};
}

function routeEdge(fn, tn, e) {
  let fp = e.fp, tp = e.tp || 'top';
  if (!fp) {
    if (tn.row < fn.row) fp = 'left';
    else if (fn.row === tn.row) fp = fn.lane < tn.lane ? 'right' : 'left';
    else fp = 'bottom';
  }
  if (tn.row < fn.row && !e.tp) tp = 'left';

  // Fork/Join: straight vertical through bar
  if ((fn.type==='fork'||fn.type==='join') && !e.skipR && tn.row > fn.row) {
    const barY = ly(fn.row)+C.BAR_H/2, ep = port(tn,'top');
    return {path:`M${ep.x},${barY}L${ep.x},${ep.y}`,gx:ep.x+8,gy:(barY+ep.y)/2,ga:'start'};
  }
  if ((tn.type==='fork'||tn.type==='join') && !e.skipR && fn.row < tn.row) {
    const sp = port(fn, fp==='bottom'?'bottom':fp), barY = ly(tn.row)-C.BAR_H/2;
    return {path:`M${sp.x},${sp.y}L${sp.x},${barY}`,gx:sp.x+8,gy:sp.y+14,ga:'start'};
  }

  const s = port(fn,fp), t = port(tn,tp);
  let path,gx,gy,ga='middle';

  if (tn.row < fn.row || e.loop) {
    const off=e._lo||0, mx=C.PAD-6-off*C.LOOP_GAP, et=port(tn,tp==='top'?'left':tp);
    path=`M${s.x},${s.y}L${mx},${s.y}L${mx},${et.y}L${et.x},${et.y}`;
    gx=mx-3;gy=(s.y+et.y)/2;ga='end';
  } else if (e.skipR) {
    const off=e._ro||0, rx=C.PAD+C.LANE_W*2+6+off*C.SKIP_GAP, et=port(tn,'right');
    path=`M${s.x},${s.y}L${rx},${s.y}L${rx},${et.y}L${et.x},${et.y}`;
    gx=s.x+14;gy=s.y-6;ga='start';
  } else if (fp==='bottom' && fn.lane===tn.lane) {
    path=`M${s.x},${s.y}L${t.x},${t.y}`;
    gx=s.x+8;gy=s.y+14;ga='start';
  } else if (fp==='bottom' && fn.lane!==tn.lane) {
    const my=(s.y+t.y)/2;
    path=`M${s.x},${s.y}L${s.x},${my}L${t.x},${my}L${t.x},${t.y}`;
    gx=(s.x+t.x)/2;gy=my-5;
  } else if ((fp==='left'||fp==='right') && tn.row > fn.row) {
    path=`M${s.x},${s.y}L${t.x},${s.y}L${t.x},${t.y}`;
    gx=fp==='left'?s.x-5:s.x+5;gy=s.y-6;ga=fp==='left'?'end':'start';
  } else if (fn.row===tn.row) {
    path=`M${s.x},${s.y}L${t.x},${t.y}`;
    gx=(s.x+t.x)/2;gy=s.y-8;
  } else {
    path=`M${s.x},${s.y}L${t.x},${t.y}`;
    gx=(s.x+t.x)/2;gy=(s.y+t.y)/2-6;
  }
  return {path,gx,gy,ga};
}

function drawNode(n) {
  const x=lx(n.lane),y=ly(n.row); let s='';
  switch(n.type){
    case 'start': s+=`<circle cx="${x}" cy="${y}" r="${C.START_R}" fill="#333"/>`; break;
    case 'end': s+=`<circle cx="${x}" cy="${y}" r="${C.END_OR}" fill="none" stroke="#333" stroke-width="2.5"/><circle cx="${x}" cy="${y}" r="${C.END_IR}" fill="#333"/>`; break;
    case 'activity': {
      const hw=C.ACT_W/2,hh=C.ACT_H/2;
      s+=`<rect x="${x-hw}" y="${y-hh}" width="${C.ACT_W}" height="${C.ACT_H}" rx="${C.ACT_R}" fill="#fff" stroke="#333" stroke-width="1.4"/>`;
      s+=mtext(x,y,n.text,C.FONT); break;
    }
    case 'decision': {
      s+=`<polygon points="${x},${y-C.DIA_HH} ${x+C.DIA_HW},${y} ${x},${y+C.DIA_HH} ${x-C.DIA_HW},${y}" fill="#fff" stroke="#333" stroke-width="1.4"/>`;
      if(n.text) s+=mtext(x,y,n.text,C.DFONT); break;
    }
    case 'fork': case 'join': {
      const bw=n.barW||C.BAR_W;
      s+=`<rect x="${x-bw/2}" y="${y-C.BAR_H/2}" width="${bw}" height="${C.BAR_H}" fill="#333" rx="1"/>`; break;
    }
  }
  return s;
}

function mtext(x,y,text,fs) {
  if(!text) return '';
  const lines=text.split('\n'),lh=fs*1.35,th=(lines.length-1)*lh;
  return lines.map((line,i)=>
    `<text x="${x}" y="${y-th/2+i*lh}" text-anchor="middle" dominant-baseline="central" font-size="${fs}" fill="#333" font-family="Inter,sans-serif">${esc(line)}</text>`
  ).join('');
}

function renderDiagram(d) {
  const maxR=Math.max(...d.nodes.map(n=>n.row));
  const svgH=C.HDR_H+C.PAD+(maxR+1)*C.ROW_H+C.PAD;
  const nm={}; d.nodes.forEach(n=>nm[n.id]=n);
  let lo=0,ro=0;
  d.edges.forEach(e=>{
    const f=nm[e.from],t=nm[e.to];
    if(t.row<f.row||e.loop) e._lo=lo++;
    if(e.skipR) e._ro=ro++;
  });
  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${SVG_W}" height="${svgH}" style="font-family:Inter,sans-serif">`;
  svg+=`<defs><marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0.5 7,3 0,5.5" fill="#444"/></marker></defs>`;
  svg+=`<rect width="${SVG_W}" height="${svgH}" fill="#fefcf0"/>`;
  const laneH=svgH-C.HDR_H;
  for(let i=0;i<2;i++){
    const lx0=C.PAD+i*C.LANE_W;
    svg+=`<rect x="${lx0}" y="${C.HDR_H}" width="${C.LANE_W}" height="${laneH}" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="8,5"/>`;
    svg+=`<rect x="${lx0}" y="${C.HDR_H}" width="${C.LANE_W}" height="28" fill="#f0ead6" stroke="#999" stroke-width="1.5"/>`;
    svg+=`<text x="${lx0+C.LANE_W/2}" y="${C.HDR_H+15}" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="600" fill="#333">${esc(d.lanes[i])}</text>`;
  }
  svg+=`<text x="${SVG_W/2}" y="${C.HDR_H/2+1}" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="#444">${esc(d.title)}</text>`;
  svg+='<g>';
  d.edges.forEach(e=>{
    const f=nm[e.from],t=nm[e.to];
    const r=routeEdge(f,t,e);
    svg+=`<path d="${r.path}" fill="none" stroke="#555" stroke-width="1.3" marker-end="url(#ah)"/>`;
    if(e.guard) svg+=`<text x="${r.gx}" y="${r.gy}" text-anchor="${r.ga}" font-size="${C.GFONT}" fill="#555" font-style="italic" font-family="Inter,sans-serif">[${esc(e.guard)}]</text>`;
  });
  svg+='</g><g>';
  d.nodes.forEach(n=>{svg+=drawNode(n);});
  svg+='</g></svg>';
  document.getElementById('svgWrap').innerHTML=svg;
}

// =====================================================
// TAB LOGIC
// =====================================================
let curMod='pos',curSub='';
function initTabs(){
  const modules=[
    {id:'pos',label:'I. Bán Hàng POS'},
    {id:'gate',label:'II. Kiểm Soát Vé'},
    {id:'booking',label:'III. Xác Nhận Đoàn'},
    {id:'rental',label:'IV. Cho Thuê Đồ'},
  ];
  const nav=document.getElementById('moduleNav');
  nav.innerHTML=modules.map(m=>`<button data-mod="${m.id}" class="${m.id===curMod?'active':''}">${m.label}</button>`).join('');
  nav.querySelectorAll('button').forEach(btn=>{
    btn.onclick=()=>{nav.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');curMod=btn.dataset.mod;renderSubTabs();};
  });
  renderSubTabs();
}
function renderSubTabs(){
  const mod=DIAGRAMS[curMod], sn=document.getElementById('subNav');
  sn.innerHTML=mod.tabs.map((t,i)=>`<button data-sub="${t.id}" class="${i===0?'active':''}">${t.label}</button>`).join('');
  curSub=mod.tabs[0].id;
  renderDiagram(mod.diagrams[curSub]);
  sn.querySelectorAll('button').forEach(btn=>{
    btn.onclick=()=>{sn.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');curSub=btn.dataset.sub;renderDiagram(DIAGRAMS[curMod].diagrams[curSub]);};
  });
}
document.addEventListener('DOMContentLoaded',initTabs);
</script>
