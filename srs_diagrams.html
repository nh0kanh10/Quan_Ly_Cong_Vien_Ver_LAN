<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Use Case & Sequence Diagrams — Hệ thống Đại Nam</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #1a1b2e;
      color: #e0e0e8;
      min-height: 100vh;
    }

    header {
      background: #22243a;
      border-bottom: 1px solid #333;
      padding: 14px 24px;
      text-align: center;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #a5b4fc;
    }

    header p {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    nav {
      display: flex;
      gap: 4px;
      padding: 10px 24px;
      background: #1e2030;
      border-bottom: 1px solid #333;
      overflow-x: auto;
    }

    nav button {
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      border: 1px solid #333;
      color: #888;
      cursor: pointer;
      white-space: nowrap;
      transition: .2s;
      font-family: inherit;
    }

    nav button:hover {
      border-color: #666;
      color: #ccc;
    }

    nav button.active {
      background: rgba(165, 180, 252, .1);
      border-color: #6366f1;
      color: #a5b4fc;
    }

    .sub-nav {
      display: flex;
      gap: 4px;
      padding: 8px 24px;
      background: #1a1b2e;
      border-bottom: 1px solid #2a2d3e;
    }

    .sub-nav button {
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      background: #22243a;
      border: 1px solid #333;
      color: #888;
      cursor: pointer;
      transition: .2s;
      font-family: inherit;
    }

    .sub-nav button:hover {
      color: #ccc;
    }

    .sub-nav button.active {
      background: #2d3050;
      border-color: #6366f1;
      color: #a5b4fc;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    .svg-wrap {
      background: #fefcf0;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .4);
      padding: 32px;
      min-width: 800px;
      display: flex;
      justify-content: center;
      border: 1px solid #333;
      overflow: auto;
    }

    .diagram-container {
      width: 100%;
      overflow: auto;
      padding: 40px;
      display: flex;
      justify-content: flex-start;
      background: #f3f4f6;
    }

    .legend-wrap {
      max-width: 800px;
      margin: 16px auto 0;
      padding: 12px 20px;
      background: #fff9c4;
      border-radius: 8px;
      border: 1px solid #fbc02d;
      font-size: 13px;
      color: #333;
      text-align: left;
      line-height: 1.6;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .legend-wrap strong {
      color: #e65100;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.8.0/dist/mermaid.min.js"></script>
</head>

  <div class="sub-nav" id="subNav"></div>

    actor M as Quản lý

    participant BUS as BUS_SanPham
    participant DAL as DAL_SanPham
    participant EB as EventBus

        frm-->>M: Hiển thị form bên phải
        deactivate frm

            frm-->>M: Cập nhật danh sách bên trái
            deactivate frm
        end
        deactivate BUS
    end
    deactivate uc

    let curMod = 'tongthe', curSub = 'uc_tongthe';

      const modules = [
        { id: 'tongthe', label: '00. TỔNG THỂ' },
        { id: 'level0', label: 'LEVEL 0 (MỚI)' },
        { id: 'sanpham', label: '01. ĐỐI TÁC & NHÂN SỰ' },
        { id: 'danhmuc', label: '02. DANH MỤC & GIÁ' },
        { id: 'banhang', label: '03. BÁN HÀNG' },
        { id: 'pos', label: '04. POS & THANH TOÁN' },
        { id: 'khachhang', label: '05. KHÁCH HÀNG CRM' },
        { id: 'luutru', label: '06. LƯU TRÚ & ĐẶT PHÒNG' },
        { id: 'kho', label: '07. KHO & VẬT TƯ' },
        { id: 'thuedo', label: '08. THUÊ ĐỒ' },
        { id: 'kiemsoat', label: '09. KIỂM SOÁT CỔNG' }
      ];
      const nav = document.getElementById('moduleNav');
      nav.innerHTML = modules.map(m => `<button data-mod="${m.id}" class="${m.id === curMod ? 'active' : ''}">${m.label}</button>`).join('');

      nav.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => {
          nav.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          curMod = btn.dataset.mod;
          renderSubTabs();
        };
      });
      renderSubTabs();
    }

    async function renderSubTabs() {
      const mod = DIAGRAMS[curMod];
      const sn = document.getElementById('subNav');
      sn.innerHTML = mod.tabs.map((t, i) => `<button data-sub="${t.id}" class="${i === 0 ? 'active' : ''}">${t.label}</button>`).join('');

      curSub = mod.tabs[0].id;
      await drawMermaid();

      sn.querySelectorAll('button').forEach(btn => {
        btn.onclick = async () => {
          sn.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          curSub = btn.dataset.sub;
          await drawMermaid();
        };
      });
    }

    async function drawMermaid() {
      const d = DIAGRAMS[curMod].diagrams[curSub];
      const wrap = document.getElementById('svgWrap');
      const legend = document.getElementById('legendWrap');

      legend.innerHTML = d.legend || '';

      if (d.isCustom) {
        renderUseCaseSVG(wrap, d.data);
      } else {
        wrap.innerHTML = `<div class="mermaid" id="mermaid-view">${d.code.trim()}</div>`;
        try {
          await mermaid.run({ nodes: [document.getElementById('mermaid-view')] });
        } catch (e) {
          console.error('Mermaid render error:', e);
        }
      }
    }

    let currentUcData = null;
    let isDragging = false;
    let dragNode = null;
    let startX, startY;
    let initialNodeX, initialNodeY;

    function renderUseCaseSVG(wrap, data) {
      currentUcData = data;
      const svgW = 1000, svgH = 800;
      let svgHTML = `<svg id="ucSvg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="background:#fefcf0; user-select:none;">
        <defs>
          <marker id="open-arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
            <path d="M0,0 L10,5 L0,10" fill="none" stroke="#555" stroke-width="1.5" />
          </marker>
          <marker id="hollow-triangle" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
            <path d="M0,2 L10,6 L0,10 Z" fill="#fefcf0" stroke="#333" stroke-width="1.5" />
          </marker>
        </defs>
        <g id="edgesLayer"></g>
        <g id="nodesLayer"></g>
      </svg>`;
      wrap.innerHTML = svgHTML;

      const svg = document.getElementById('ucSvg');
      const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      bg.setAttribute('width', svgW);
      bg.setAttribute('height', svgH);
      bg.setAttribute('fill', '#fffdf2');
      svg.insertBefore(bg, svg.firstChild);

      svg.addEventListener('mousedown', e => {
        const g = e.target.closest('.draggable');
        if (!g) return;
        isDragging = true;
        dragNode = currentUcData.nodes.find(n => n.id === g.dataset.id);
        startX = e.clientX;
        startY = e.clientY;
        initialNodeX = dragNode.x;
        initialNodeY = dragNode.y;
        g.style.cursor = 'grabbing';
      });

      window.addEventListener('mousemove', e => {
        if (!isDragging || !dragNode) return;
        const ctm = svg.getScreenCTM();
        const dx = (e.clientX - startX) / ctm.a;
        const dy = (e.clientY - startY) / ctm.d;
        dragNode.x = initialNodeX + dx;
        dragNode.y = initialNodeY + dy;
        drawElements();
      });

      window.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false;
          dragNode = null;
          console.log("--- TỌA ĐỘ MỚI ---");
          currentUcData.nodes.forEach(n => console.log(`{ id: '${n.id}', x: ${Math.round(n.x)}, y: ${Math.round(n.y)} }`));
        }
      });

      drawElements();
    }

    function drawElements() {
      if (!currentUcData) return;
      const edgesLayer = document.getElementById('edgesLayer');
      const nodesLayer = document.getElementById('nodesLayer');
      edgesLayer.innerHTML = '';
      nodesLayer.innerHTML = '';

      currentUcData.edges.forEach(edge => {
        const fn = currentUcData.nodes.find(n => n.id === edge.from);
        const tn = currentUcData.nodes.find(n => n.id === edge.to);
        if (!fn || !tn) return;

        let fx = fn.x, fy = fn.y;
        let tx = tn.x, ty = tn.y;

        let fx_adj = fx, fy_adj = fy;
        let tx_adj = tx, ty_adj = ty;

        if (fn.type === 'boundary') { fx_adj += fn.w / 2; fy_adj += fn.h / 2; }
        if (tn.type === 'boundary') { tx_adj += tn.w / 2; ty_adj += tn.h / 2; }
        if (fn.type === 'actor' && tn.type === 'actor') { fy_adj -= 15; ty_adj -= 15; }

        let strokeDash = (edge.type === 'include' || edge.type === 'extend') ? 'stroke-dasharray="6,4"' : '';
        let marker = '';
        if (edge.type === 'include' || edge.type === 'extend') marker = 'marker-end="url(#open-arrow)"';
        else if (edge.type === 'inherit') marker = 'marker-end="url(#hollow-triangle)"';

        let dx = tx_adj - fx_adj, dy = ty_adj - fy_adj;
        let len = Math.sqrt(dx * dx + dy * dy);
        let r1 = 0, r2 = 0;

        if (edge.type === 'include' || edge.type === 'extend') { r1 = 80; r2 = 80; }
        else if (edge.type === 'inherit') { r1 = 20; r2 = 25; }

        if (len > r1 + r2) {
          let n_fx = fx_adj + dx * (r1 / len);
          let n_fy = fy_adj + dy * (r1 / len);
          let n_tx = tx_adj - dx * (r2 / len);
          let n_ty = ty_adj - dy * (r2 / len);
          fx_adj = n_fx; fy_adj = n_fy;
          tx_adj = n_tx; ty_adj = n_ty;
        }

        if (edge.type === 'extend') {
          let tmpX = fx_adj, tmpY = fy_adj;
          fx_adj = tx_adj; fy_adj = ty_adj;
          tx_adj = tmpX; ty_adj = tmpY;
        }

        let strokeCol = edge.type === 'inherit' ? '#333' : '#555';
        let pathObj = `<path d="M${fx_adj},${fy_adj} L${tx_adj},${ty_adj}" stroke="${strokeCol}" stroke-width="1.5" fill="none" ${strokeDash} ${marker}/>`;
        edgesLayer.innerHTML += pathObj;

        if (edge.type) {
          const mx = (fx_adj + tx_adj) / 2;
          const my = (fy_adj + ty_adj) / 2;
          const lbl = `&lt;&lt;${edge.type}&gt;&gt;` + (edge.label ? `<br/>${edge.label}` : '');
          edgesLayer.innerHTML += `<foreignObject x="${mx - 60}" y="${my - 20}" width="120" height="40" style="pointer-events:none;">
               <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px; color:#555; text-align:center; background:rgba(254,252,240,0.8); line-height:1.2;">${lbl}</div>
            </foreignObject>`;
        }
      });

      currentUcData.nodes.forEach(node => {
        let group = `<g class="draggable" data-id="${node.id}" transform="translate(${node.x}, ${node.y})" style="cursor: grab;">`;
        if (node.type === 'boundary') {
          const w = node.w || 400, h = node.h || 500;
          group += `<rect x="0" y="0" width="${w}" height="${h}" fill="transparent" stroke="#2a2d3e" stroke-width="1.5" stroke-dasharray="8,4" />`;
          group += `<text x="${w / 2}" y="20" fill="#2a2d3e" font-weight="bold" font-size="14" text-anchor="middle">${node.label}</text>`;
        } else if (node.type === 'actor') {
          group += `<svg x="-12" y="-35" width="24" height="30" viewBox="0 0 24 30" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"><circle cx="12" cy="5" r="3"/><path d="M12 8v10M12 18l-4 9M12 18l4 9M5 11h14"/></svg>`;
          group += `<text x="0" y="10" fill="#333" font-size="12" font-weight="bold" text-anchor="middle">${node.label}</text>`;
        } else if (node.type === 'usecase') {
          group += `<ellipse cx="0" cy="0" rx="75" ry="30" fill="#eef2ff" stroke="#6366f1" stroke-width="2" />`;
          group += `<foreignObject x="-65" y="-15" width="130" height="30" style="pointer-events:none;">
            <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:12px; color:#1e2030; text-align:center; font-weight:500; display:flex; align-items:center; justify-content:center; height:100%;">${node.label}</div>
          </foreignObject>`;
        }
        group += `</g>`;
        nodesLayer.innerHTML += group;
      });
    }

    document.addEventListener('DOMContentLoaded', initTabs);
  </script>
